name: Build musl (aarch64)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3 pkg-config libglib2.0-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup musl linker
        run: |
          sudo ln -sf aarch64-linux-gnu-gcc /usr/local/bin/aarch64-linux-musl-gcc
          aarch64-linux-musl-gcc --version

      - name: Install gn
        run: |
          git clone --depth 1 https://gn.googlesource.com/gn /tmp/gn
          cd /tmp/gn
          python3 build/gen.py --no-last-commit-position
          printf '#define LAST_COMMIT_POSITION_NUM 0\n#define LAST_COMMIT_POSITION "0"\n' > out/last_commit_position.h
          ninja -j$(nproc) -C out
          sudo cp out/gn /usr/local/bin/
          gn --version

      - name: Install Rust (aarch64-musl)
        run: |
          rustup target add aarch64-unknown-linux-musl

      - name: Build Obscura
        run: |
          export CC_aarch64_unknown_linux_musl=aarch64-linux-musl-gcc
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc
          export RUSTFLAGS="-C link-arg=-Wl,-Bstatic -C link-arg=-Wl,-Bdynamic"
          export V8_FROM_SOURCE=1
          cargo build --release --target aarch64-unknown-linux-musl --bin obscura --bin obscura-worker

      - name: Package
        run: |
          mkdir -p output
          cp target/aarch64-unknown-linux-musl/release/obscura output/
          cp target/aarch64-unknown-linux-musl/release/obscura-worker output/
          cd output && tar czf ../obscura-aarch64-musl.tar.gz obscura obscura-worker

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: obscura-aarch64-musl
          path: obscura-aarch64-musl.tar.gz

name: Build musl (aarch64)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3 curl

      - name: Download gn
        run: |
          curl -LO https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest
          unzip latest -d gn-bin
          chmod +x gn-bin/gn
          echo "$PWD/gn-bin" >> $GITHUB_PATH

      - name: Install Rust (aarch64-musl)
        run: |
          rustup target add aarch64-unknown-linux-musl

      - name: Build
        run: |
          export CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc
          export V8_FROM_SOURCE=1
          cargo build --release --target aarch64-unknown-linux-musl --bin obscura --bin obscura-worker

      - name: Package
        run: |
          mkdir -p output
          cp target/aarch64-unknown-linux-musl/release/obscura output/
          cp target/aarch64-unknown-linux-musl/release/obscura-worker output/
          cd output && tar czf ../obscura-aarch64-musl.tar.gz obscura obscura-worker

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: obscura-aarch64-musl
          path: obscura-aarch64-musl.tar.gz
